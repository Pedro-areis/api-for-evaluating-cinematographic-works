name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '25'
                cache: 'maven'

            - name: Maven Wrapper permissions
              run: chmod +x ./mvnw

            - name: Run tests
              run: ./mvnw test

            - name: Build with Maven
              run: ./mvnw clean package -DskipTests

            - name: Login Docker Hub
              run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            - name: Build Docker image
              run: docker build -t pedro084/api-for-evaluating-cinematographic-works:latest .

            - name: Push Docker image
              run: docker push pedro084/api-for-evaluating-cinematographic-works:latest