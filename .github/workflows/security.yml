name: Security (DevSecOps)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast_semgrep:
    name: SAST - Análise Estática de Código
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

  sca_trivy:
    name: SCA - Análise de Dependências
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven Wrapper permissions
        run: chmod +x ./mvnw

      - name: Resolve Dependencies
        run: ./mvnw dependency:resolve

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          skip-files: '.env'