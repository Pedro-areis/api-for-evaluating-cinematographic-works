version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecw_db_container
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: ecw_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ecw_api_container
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ecw_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - API_ECW_TOKEN_SECRET=${JWT_SECRET_KEY}
      - TMDB_API_TOKEN=${TMDB_SECRET_TOKEN}
      - TMDB_API_KEY=${TMDB_API_PUBLIC_KEY}

volumes:
  postgres_data:
