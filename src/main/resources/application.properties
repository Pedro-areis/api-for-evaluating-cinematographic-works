spring.application.name=api_ecw

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/ecw_db

spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:user}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.plugin-register.database-type-ignore-categories=true

api_ecw.token.secret=${JWT_SECRET_KEY:chave_secreta_local_para_testes_na_ide}

tmdb.api.url=https://api.themoviedb.org/3

tmdb.api.token=${TMDB_SECRET_TOKEN:token_local_invalido}
tmdb.api.key=${TMDB_API_PUBLIC_KEY:key_local_invalida}